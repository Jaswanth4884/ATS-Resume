<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Resume Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; text-align: center;
    }
    .c { max-width: 400px; padding: 40px; }
    h1 { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    p { color: #94a3b8; margin: 16px 0 24px; }
    a { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
      border-radius: 10px; text-decoration: none; font-weight: 600; }
    a:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3); }
  </style>
</head>
<body>
  <div class="c">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">← Back Home</a>
  </div>
</body>
</html>
